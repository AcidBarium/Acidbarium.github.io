name: Deploy Valaxy site to GitHub Pages

on:
  push:
    branches:
      - main
      - master
      - valaxy

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # 安装 pnpm，并自动安装依赖（替代 npm install）
      - name: Install pnpm and dependencies
        uses: pnpm/action-setup@v4
        with:
          version: 8.11.0 
          run_install: true

      # 指定 Node LTS
      - name: Use Node.js LTS
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          registry-url: https://registry.npmjs.org/
          cache: pnpm

      # 可选：如果你有 Algolia 索引
      - name: 🔍 Generate Algolia
        if: env.HEXO_ALGOLIA_INDEXING_KEY
        env:
          HEXO_ALGOLIA_INDEXING_KEY: ${{ secrets.HEXO_ALGOLIA_INDEXING_KEY }}
        run: npm run algolia

      # 构建 Valaxy
      - name: 🌌 Build Valaxy Blog
        run: npm run build
        env:
          NODE_OPTIONS: --max-old-space-size=6144

      # 上传 dist 到 pages artifact
      - name: ⏫ Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages

    steps:
      - name: 🪤 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
